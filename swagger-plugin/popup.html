<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swagger Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="popup">
    <header class="hero">
      <p class="kicker">API Security Assistant</p>
      <h2>Swagger Reader</h2>
      <p class="subtitle">Load documentation and run security tests.</p>
    </header>

    <section class="card controls">
      <label for="swaggerUrl">Enter Swagger URL</label>
      <input id="swaggerUrl" type="text" placeholder="https://petstore.swagger.io/v2/swagger.json">
      <label for="swaggerFile" class="small-label file-label">or from a JSON/YAML file</label>
      <input id="swaggerFile" class="file-input" type="file" accept=".json,.yaml,.yml">
      <label for="apiKeyInput" class="small-label file-label">API key</label>
      <input id="apiKeyInput" class="file-input" type="password" placeholder="Enter API key">
      <button id="saveApiKey" class="secondary-btn">Save API key</button>
      <button id="requestApiKey" class="secondary-btn" type="button">Request API key</button>
      <button id="loadSwagger">Load Swagger</button>
      <p class="notice">Only test your own or explicitly authorized endpoints. Avoid production systems without permission.</p>
    </section>

    <section id="output" class="card output"></section>

    <section id="timeline" class="card timeline" style="display: none;">
      <h3>Test Report</h3>
      <div id="timelineList"></div>
      <button id="backBtn">Back</button>
      <button id="downloadBtn" class="secondary-btn" style="display: none;">Download detailed</button>
    </section>
  </main>

  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <script src="popup.js"></script>
</body>
</html>
