<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swagger Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="popup">
    <header class="hero">
      <p class="kicker">API Security Assistant</p>
      <h2>Swagger Reader</h2>
      <p class="subtitle">Ucitaj dokumentaciju i pokreni sigurnosne testove.</p>
    </header>

    <section class="card controls">
      <label for="swaggerUrl">Unesi Swagger URL</label>
      <input id="swaggerUrl" type="text" placeholder="https://petstore.swagger.io/v2/swagger.json">
      <button id="loadSwagger">Ucitaj Swagger</button>
    </section>

    <section id="output" class="card output"></section>

    <section id="timeline" class="card timeline" style="display: none;">
      <h3>Izvjestaj testiranja</h3>
      <div id="timelineList"></div>
      <button id="backBtn">Nazad</button>
      <button id="downloadBtn" class="secondary-btn" style="display: none;">Preuzmi detaljnije</button>
    </section>
  </main>

  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <script src="popup.js"></script>
</body>
</html>
