<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request API Key</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121821;
      --text: #f4f6fb;
      --muted: #a3adba;
      --accent: #4dd0a4;
      --border: #1f2a36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(900px 600px at 10% 10%, #142030 0%, #0b0f14 60%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 18px; color: var(--muted); }
    label { display: block; margin: 12px 0 6px; font-size: 13px; color: var(--muted); }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f141b;
      color: var(--text);
      outline: none;
    }
    textarea { min-height: 110px; resize: vertical; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .btn {
      margin-top: 16px;
      background: var(--accent);
      color: #0b0f14;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .note { margin-top: 10px; font-size: 12px; color: var(--muted); }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section class="card">
    <h1>Request API Key</h1>
    <p>Fill in the form and your email client will open with a prefilled request.</p>

    <form id="requestForm">
      <div class="row">
        <div>
          <label for="fullName">Full name</label>
          <input id="fullName" name="fullName" type="text" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>
      </div>

      <label for="organization">Organization (optional)</label>
      <input id="organization" name="organization" type="text">

      <label for="target">Target domain(s) you will test</label>
      <input id="target" name="target" type="text" placeholder="e.g. dev-api.example.com" required>

      <label for="purpose">Purpose</label>
      <textarea id="purpose" name="purpose" placeholder="Short description of your test use case" required></textarea>

      <button class="btn" type="submit">Send request</button>
      <button class="btn" type="button" id="copyRequestBtn">Copy request</button>
      <a class="note" id="mailtoFallback" href="mailto:eminpepic2003@gmail.com">Open email manually</a>
      <div class="note">If your mail client doesn't open, use "Copy request" and send it manually.</div>
    </form>
  </section>

  <script src="request-access.js"></script>
</body>
</html>
